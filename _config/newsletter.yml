---
Name: mspacemedia-newsletter
After:
  - '#elementalarea'
---
# Attach an Elemental area to the newsletter issue so admins compose with blocks.
MSpaceMedia\Newsletter\Model\NewsletterIssue:
  extensions:
    - DNADesign\Elemental\Extensions\ElementalAreasExtension

# Newsletter blocks are email-only, so keep them out of normal page block pickers.
# NewsletterIssue has its own ElementalArea whitelist and is unaffected by this.
Page:
  disallowed_elements:
    - MSpaceMedia\Newsletter\Elements\NewsletterBlockElemental
    - MSpaceMedia\Newsletter\Elements\HeaderBlock
    - MSpaceMedia\Newsletter\Elements\HeadingBlock
    - MSpaceMedia\Newsletter\Elements\TextBlock
    - MSpaceMedia\Newsletter\Elements\BoxedTextBlock
    - MSpaceMedia\Newsletter\Elements\ColumnsBlock
    - MSpaceMedia\Newsletter\Elements\ImageBlock
    - MSpaceMedia\Newsletter\Elements\ImageCaptionBlock
    - MSpaceMedia\Newsletter\Elements\ImageGroupBlock
    - MSpaceMedia\Newsletter\Elements\ImageCardBlock
    - MSpaceMedia\Newsletter\Elements\ButtonBlock
    - MSpaceMedia\Newsletter\Elements\VideoBlock
    - MSpaceMedia\Newsletter\Elements\SocialFollowBlock
    - MSpaceMedia\Newsletter\Elements\LogoBlock
    - MSpaceMedia\Newsletter\Elements\CodeBlock
    - MSpaceMedia\Newsletter\Elements\DividerBlock
    - MSpaceMedia\Newsletter\Elements\SpacerBlock
    - MSpaceMedia\Newsletter\Elements\FooterBlock

---
Name: mspacemedia-newsletter-routes
After:
  - '#rootroutes'
  - '#coreroutes'
---
SilverStripe\Control\Director:
  rules:
    'newsletter//$Action/$Token': 'MSpaceMedia\Newsletter\Control\NewsletterController'

---
Name: mspacemedia-newsletter-mergefields
---
# Computed merge fields ({{ … }}) traverse the subscriber's anchor record. The
# anchor type drives what the visual builder introspects; default is Member.
MSpaceMedia\Newsletter\Model\NewsletterSubscriber:
  anchor_class: SilverStripe\Security\Member

# The allowlist is DEFAULT-DENY: a class listed here exposes only the named
# relations/fields to the expression engine (parent-class entries cover
# subclasses). Nothing is traversable until a host project opts in, e.g.:
#
# MSpaceMedia\Newsletter\Service\MergeFieldService:
#   currency_symbol: '£'
#   allowlist:
#     SilverStripe\Security\Member:
#       relations: [Orders]
#       fields: [FirstName, Surname, Email]
#     App\Shop\Order:
#       fields: [TotalDonation, Amount, Status, Created]
MSpaceMedia\Newsletter\Service\MergeFieldService:
  currency_symbol: '£'
  allowlist: {}
